name: ci

"on":
  push:
    branches:
    - main
    - test-me-*
  pull_request:
    branches:
    - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    shell: bash

env:
  LANG: en_US.utf-8
  LC_ALL: en_US.utf-8
  PYTHONIOENCODING: UTF-8
  PYTHONWARNDEFAULTENCODING: "1"
  PYTHON_VERSIONS: ""

permissions:
  contents: read
  pull-requests: read

jobs:

  changes:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      pull-requests: read
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
      id: filter
      with:
        filters: |
          src:
            - 'src/**'
            - 'tests/**'
            - 'pyproject.toml'
            - 'uv.lock'
            - 'docs/**'
            - 'zensical.toml'
            - '*.md'

  links:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Check links
      uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
      with:
        fail: true
        args: --config .lychee.toml --no-progress .

  prek:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: "3.14"
        enable-cache: true
        github-token: ${{ secrets.GITHUB_TOKEN }}
    - uses: j178/prek-action@79f765515bd648eb4d6bb1b17277b7cb22cb6468 # v2.0.0
      env:
        SKIP: no-commit-to-main,pytest-testmon,lychee
      with:
        extra-args: '--all-files'

  quality:
    needs: changes
    if: ${{ github.event_name == 'push' || needs.changes.outputs.src == 'true' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup uv and Python
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: "3.14"
        enable-cache: true
        cache-dependency-glob: pyproject.toml
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Install dependencies
      run: uv run poe setup

    - name: Check if the documentation builds correctly
      run: |
        mkdir -p htmlcov
        echo '<html><body>No coverage report yet</body></html>' > htmlcov/index.html
        uv run poe docs-build

    - name: Store objects inventory for tests
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: objects.inv
        path: site/objects.inv

  tests:

    needs:
    - prek
    - quality
    strategy:
      matrix:
        os:
        - blacksmith-4vcpu-ubuntu-2404
        - macos-latest
        - blacksmith-4vcpu-windows-2025
        python-version:
        - "3.14"
        resolution:
        - highest
        - lowest-direct
        exclude:
        - os: macos-latest
          resolution: lowest-direct
        - os: blacksmith-4vcpu-windows-2025
          resolution: lowest-direct
    runs-on: ${{ matrix.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Setup uv and Python
      uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true
        cache-dependency-glob: pyproject.toml
        github-token: ${{ secrets.GITHUB_TOKEN }}
        cache-suffix: ${{ matrix.resolution }}

    - name: Install dependencies
      env:
        UV_RESOLUTION: ${{ matrix.resolution }}
      run: uv run poe setup

    - name: Download objects inventory
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: objects.inv
        path: site/

    - name: Run the test suite
      run: uv run poe test-cov

    - name: Extract coverage percentage
      if: ${{ matrix.os == 'blacksmith-4vcpu-ubuntu-2404' && matrix.resolution == 'highest' }}
      id: coverage
      run: |
        total=$(uv run coverage report --format=total)
        echo "total=$total" >> "$GITHUB_OUTPUT"

    - name: Update coverage badge
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && matrix.os == 'blacksmith-4vcpu-ubuntu-2404' && matrix.resolution == 'highest' }}
      uses: schneegans/dynamic-badges-action@0e50b8bad39e7e1afd3e4e9c2b7dd145fad07501 # v1.8.0
      with:
        auth: ${{ secrets.GIST_TOKEN }}
        gistID: 759ab8d29e8650758515a72c9d8262d2
        filename: coverage.json
        label: coverage
        message: ${{ steps.coverage.outputs.total }}%
        valColorRange: ${{ steps.coverage.outputs.total }}
        minColorRange: 50
        maxColorRange: 90

  ci-pass:
    if: always()
    needs: [links, prek, quality, tests]
    runs-on: ubuntu-latest
    steps:
    - name: Check all jobs passed
      uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
      with:
        allowed-skips: quality, tests
        jobs: ${{ toJSON(needs) }}
